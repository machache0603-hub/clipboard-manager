name: selftest
on: [push, pull_request]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 安装依赖(Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3
          pip install PyQt6 python-xlib
      - name: 安装依赖(Windows / macOS)
        if: runner.os != 'Linux'
        run: pip install PyQt6 pynput
      - name: 运行自测
        env:
          QT_QPA_PLATFORM: offscreen
        run: python clipboard_manager.py --selftest
