name: package
# 三平台打包:Linux deb / Windows exe / macOS dmg。
# 手动触发时产物保存到 Artifacts;推 v* 标签时还会创建
# GitHub Release，上传三个安装包和 SHA256SUMS.txt。
on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号'
        default: '1.1.0'
  push:
    tags: ['v*']

env:
  VERSION: ${{ github.event.inputs.version || github.ref_name || '1.1.0' }}

permissions:
  contents: write

jobs:
  linux-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 打包 deb
        run: |
          VER="${VERSION#v}"
          chmod +x packaging/build_deb.sh
          ./packaging/build_deb.sh "$VER"
      - uses: actions/upload-artifact@v4
        with:
          name: clipboard-manager-linux-deb
          path: dist/*.deb

  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 打包 exe
        shell: bash
        run: |
          VER="${VERSION#v}"
          pip install PyQt6 pynput pyinstaller
          pyinstaller --noconfirm --clean --onefile --windowed \
            --name clipboard-manager clipboard_manager.py
          mv dist/clipboard-manager.exe \
            "dist/clipboard-manager_${VER}_windows.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: clipboard-manager-windows-exe
          path: dist/*_windows.exe

  macos-dmg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 打包 .app 与 dmg
        run: |
          VER="${VERSION#v}"
          pip install PyQt6 pynput pyinstaller
          pyinstaller --noconfirm --clean --windowed \
            --name "Clipboard History" \
            --osx-bundle-identifier com.clipboard-manager \
            clipboard_manager.py
          hdiutil create -volname "Clipboard History" \
            -srcfolder "dist/Clipboard History.app" -ov -format UDZO \
            "dist/ClipboardHistory_${VER}.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: clipboard-manager-macos-dmg
          path: dist/*.dmg

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux-deb, windows-exe, macos-dmg]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: 生成 SHA256 校验文件
        run: |
          cd release-assets
          sha256sum ./* > SHA256SUMS.txt
      - name: 发布 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --title "Clipboard Manager $GITHUB_REF_NAME" \
            --generate-notes
